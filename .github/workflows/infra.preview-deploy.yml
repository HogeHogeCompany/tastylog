name: "infra-preview-deploy"

on:
  push:
    branches:
      - main
    paths:
      - "10_infra/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  # github-actionsがリポジトリの内容を読み取ることを許可する
  contents: read
  # githubによるOIDCトークンの発行を許可する
  id-token: write

env:
  TF_VERSION: 1.14.6

defaults:
  run:
    shell: bash
    working-directory: "10_infra/"

jobs:
  preview:
    name: "Preview"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Format
        run: |
          terraform fmt -check
