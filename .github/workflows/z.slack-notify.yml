name: "Z Slack Notify"

on:
  workflow_dispatch:

jobs:
  notify:
    name: Slack Notify
    runs-on: ubuntu-latest
    steps:
      - name: Slack Notify
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C0B8YPV5T2Q",
                  {
                    "attachments": [
                        {
                            "blocks": [
                                {
                                    "type": "header",
                                    "text": {
                                        "type": "plain_text",
                                        "text": "Message Header",
                                        "emoji": true
                                    }
                                },
                                {
                                    "type": "markdown",
                                    "text": "Hello from Github Actions!!"
                                }
                            ]
                        }
                    ]
                }
            }
